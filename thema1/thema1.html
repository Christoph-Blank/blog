<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">

  <title>Pokémon Karten</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <div class="sidebar">
    <h2>Navigation</h2>
    <a href="../index.html">Startseite</a>
    <a href="thema1.html">Pokémon Karten</a>
    <a href="../thema2/thema2.html">Thema 2</a>
  </div>

  <div class="main-content">

    <div class="article-wrapper">
      <iframe src="thema1-content.html" class="content-frame"></iframe>
      <iframe src="thema1-comments.html" class="comment-frame"></iframe>
    </div>

  </div>

  <script>
function resizeIframe(iframe) {
    try {
        const height = iframe.contentWindow.document.body.scrollHeight;
        iframe.style.height = height + "px";
    } catch (e) {}
}

document.querySelectorAll("iframe").forEach(iframe => {
    iframe.onload = function() {
        resizeIframe(iframe);

        // Mehrfach nachjustieren (wichtig für Utterances!)
        setTimeout(() => resizeIframe(iframe), 500);
        setTimeout(() => resizeIframe(iframe), 1500);
        setTimeout(() => resizeIframe(iframe), 3000);
    };
});
</script>

</body>
</html>
