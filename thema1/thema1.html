      <iframe src="thema1-content.html" class="content-frame"></iframe>
      <iframe src="thema1-comments.html" class="comment-frame"></iframe>
    </div>

  </div>

  <script>
  // automatische Höhe für beide iframes
  function resizeIframe(iframe) {
      iframe.style.height = iframe.contentWindow.document.body.scrollHeight + "px";
  }

  document.querySelectorAll("iframe").forEach(iframe => {
      iframe.onload = function() {
          resizeIframe(iframe);
      };
  });
  </script>

</body>
